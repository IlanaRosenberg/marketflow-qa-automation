{% extends "base.html" %}
{% block title %}Order History — MarketFlow{% endblock %}

{% block content %}
<h1 class="mb-4">Order History</h1>
<div data-testid="page-order-history">
  <div class="text-center py-5" id="loading-spinner">
    <div class="spinner-border" role="status"></div>
  </div>

  <div class="d-none" id="orders-content">
    <div id="orders-has-items">
      <table class="table table-hover" data-testid="orders-table">
        <thead data-testid="orders-header">
          <tr>
            <th data-testid="col-order-id">Order ID</th>
            <th data-testid="col-date">Date</th>
            <th data-testid="col-total">Total</th>
            <th data-testid="col-status">Status</th>
            <th data-testid="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="orders-tbody"></tbody>
      </table>
    </div>

    <div class="text-center py-5 d-none" data-testid="no-orders" id="no-orders">
      <p class="fs-5 text-muted">No orders found.</p>
      <a href="/" class="btn btn-primary">Start Shopping</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const STATUS_BADGES = {
  completed: "bg-success",
  pending: "bg-warning text-dark",
  cancelled: "bg-secondary",
};

async function loadOrders() {
  const res = await api.get("/api/orders/");
  document.getElementById("loading-spinner").classList.add("d-none");
  document.getElementById("orders-content").classList.remove("d-none");

  if (!res.success) return;
  const { orders } = res.data;

  if (orders.length === 0) {
    document.getElementById("orders-has-items").classList.add("d-none");
    document.getElementById("no-orders").classList.remove("d-none");
    return;
  }

  document.getElementById("orders-tbody").innerHTML = orders.map(o => `
    <tr data-testid="order-row-${o.id}">
      <td data-testid="order-id-${o.id}">#${o.id}</td>
      <td data-testid="order-date-${o.id}">${new Date(o.created_at).toLocaleDateString()}</td>
      <td data-testid="order-total-${o.id}">$${o.total_price.toFixed(2)}</td>
      <td>
        <span class="badge ${STATUS_BADGES[o.status] || "bg-secondary"}"
          data-testid="order-status-${o.id}">${o.status}</span>
      </td>
      <td class="d-flex gap-1">
        <a href="/orders/${o.id}" class="btn btn-sm btn-outline-primary"
          data-testid="btn-view-order-${o.id}">View</a>
        <button class="btn btn-sm btn-outline-danger"
          data-testid="btn-cancel-order-${o.id}"
          onclick="cancelOrder(${o.id})"
          ${o.status === "cancelled" ? "disabled" : ""}>Cancel</button>
      </td>
    </tr>
  `).join("");
}

async function cancelOrder(orderId) {
  if (!confirm("Cancel this order?")) return;
  const res = await api.post(`/api/orders/${orderId}/cancel`, {});
  if (res.success) loadOrders();
  else showToast(res.error, "danger");
}

loadOrders();
</script>
{% endblock %}
