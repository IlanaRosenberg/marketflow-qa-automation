<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MarketFlow{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="d-flex flex-column min-vh-100">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark" data-testid="navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/" data-testid="nav-home">&#128722; MarketFlow</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto" data-testid="nav-links">
          <li class="nav-item">
            <a class="nav-link" href="/" data-testid="nav-products">Products</a>
          </li>
          <li class="nav-item d-none" id="nav-my-orders-item">
            <a class="nav-link" href="/my-orders" data-testid="nav-my-orders">My Orders</a>
          </li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="/cart" data-testid="nav-cart">
              Cart <span class="badge bg-warning text-dark" data-testid="cart-count" id="cart-count">0</span>
            </a>
          </li>
          <li class="nav-item" data-testid="nav-user-section" id="nav-user-section">
            <a class="nav-link" href="/login" data-testid="nav-login" id="nav-login-link">Login</a>
          </li>
          <li class="nav-item d-none" id="nav-user-info">
            <span class="nav-link text-light" data-testid="nav-username" id="nav-username"></span>
          </li>
          <li class="nav-item d-none" id="nav-logout-item">
            <a class="nav-link" href="/logout" data-testid="nav-logout">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-4 flex-grow-1" data-testid="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-dark text-light text-center py-3 mt-auto" data-testid="footer">
    <small>MarketFlow &copy; 2026 — QA Automation Portfolio Project</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/ui-helpers.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
