[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    api: API tests using Flask test client
    ui: UI tests using Selenium WebDriver
    integration: Cross-layer integration tests
    smoke: Critical happy-path tests — run on every commit (~5 min)
    sanity: Core-feature tests run after each deployment (~15 min)
    regression: Full regression suite — run before release (~all tests)
addopts = -v --tb=short
